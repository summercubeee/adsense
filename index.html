<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>본질센스 RPG: 시스템의 주인</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 4px solid #444; image-rendering: pixelated; box-shadow: 0 0 40px rgba(0,0,0,1); }
    </style>
</head>
<body>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 600,
            height: 600,
            pixelArt: true,
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, master, monster, cursors, score = 0, stage = 1;
        let scoreText, stageLabel, dialogBox, dialogText;

        function preload() {
            // 주인공 스프라이트 시트 (제공해주신 파일명 적용)
            // 프레임 크기는 이미지에 따라 조정이 필요할 수 있습니다 (기본 64x64 설정)
            this.load.spritesheet('player', 'image_31e057.png', { frameWidth: 64, frameHeight: 64 });
            
            this.load.image('master', 'master.png');
            this.load.image('monster', 'monster.png');
            this.load.image('bg', 'bg.png');
        }

        function create() {
            // 배경
            if (this.textures.exists('bg')) {
                this.add.image(300, 300, 'bg').setDisplaySize(600, 600).setAlpha(0.3);
            } else {
                this.add.grid(300, 300, 600, 600, 50, 50, 0x1a1a1a).setAlpha(0.5);
            }

            // 박사님
            master = this.physics.add.sprite(300, 150, 'master');
            this.add.text(300, 80, 'MASTER', { font: 'bold 16px Courier', fill: '#ffcc00' }).setOrigin(0.5);

            // 주인공 애니메이션 설정 (방향별 걷기)
            this.anims.create({
                key: 'down',
                frames: this.anims.generateFrameNumbers('player', { start: 0, end: 3 }),
                frameRate: 10,
                repeat: -1
            });
            this.anims.create({
                key: 'left',
                frames: this.anims.generateFrameNumbers('player', { start: 4, end: 7 }),
                frameRate: 10,
                repeat: -1
            });
            this.anims.create({
                key: 'right',
                frames: this.anims.generateFrameNumbers('player', { start: 8, end: 11 }),
                frameRate: 10,
                repeat: -1
            });
            this.anims.create({
                key: 'up',
                frames: this.anims.generateFrameNumbers('player', { start: 12, end: 15 }),
                frameRate: 10,
                repeat: -1
            });

            player = this.physics.add.sprite(300, 450, 'player');
            player.setCollideWorldBounds(true);

            monster = this.physics.add.sprite(1000, 1000, 'monster');
            monster.setScale(1.5).setTint(0xff3333);

            // UI 및 대화창
            scoreText = this.add.text(20, 20, 'REVENUE: $0.00', { font: 'bold 24px Courier', fill: '#00ff88' });
            stageLabel = this.add.text(20, 55, 'STAGE 1: 정석 수련', { font: '14px Courier', fill: '#aaa' });
            dialogBox = this.add.rectangle(300, 530, 560, 100, 0x000000).setAlpha(0.85).setStrokeStyle(2, 0x00ff88);
            dialogText = this.add.text(300, 530, "박사님: '수련을 시작하게. 가까이 와서 [Space]를 누르게.'", { 
                font: '14px Courier', fill: '#fff', align: 'center', wordWrap: { width: 500 } 
            }).setOrigin(0.5);

            cursors = this.input.keyboard.createCursorKeys();
        }

        function update() {
            player.setVelocity(0);
            
            if (cursors.left.isDown) {
                player.setVelocityX(-160);
                player.anims.play('left', true);
            } else if (cursors.right.isDown) {
                player.setVelocityX(160);
                player.anims.play('right', true);
            } else if (cursors.up.isDown) {
                player.setVelocityY(-160);
                player.anims.play('up', true);
            } else if (cursors.down.isDown) {
                player.setVelocityY(160);
                player.anims.play('down', true);
            } else {
                player.anims.stop();
            }

            if (Phaser.Input.Keyboard.JustDown(cursors.space)) {
                checkInteraction();
            }
        }

        function checkInteraction() {
            const distMaster = Phaser.Math.Distance.Between(player.x, player.y, master.x, master.y);
            const distMonster = Phaser.Math.Distance.Between(player.x, player.y, monster.x, monster.y);

            if (distMaster < 100) {
                runStageDialogue();
            } else if (stage === 2 && distMonster < 120) {
                updateDialog("몬스터: '데이터 없는 100만 키워드는 네 노가다를 비웃는다!'");
                game.scene.scenes[0].time.delayedCall(2000, () => {
                    stage = 3;
                    stageLabel.setText("STAGE 3: 데이터 안경 (O/X)");
                    updateDialog("박사님: '보았는가? 이제 데이터 안경을 끼고 진짜 틈새를 보게.'");
                });
            }
        }

        function runStageDialogue() {
            // 기존 7단계 시나리오 로직 동일
            switch(stage) {
                case 1:
                    updateDialog("박사님: '글은 인격이다. 검색자가 원하는 정보를 정확히 적어라.'");
                    score += 0.01;
                    if (score >= 0.05) { stage = 2; monster.setPosition(150, 300); stageLabel.setText("STAGE 2: 가짜 노력의 습격"); }
                    break;
                case 3:
                    updateDialog("박사님: '데이터가 O라고 하는 곳에 네 모든 힘을 쏟아부어라.'");
                    score += 10;
                    if (score >= 50) { stage = 4; stageLabel.setText("STAGE 4: 마케터 전직"); }
                    break;
                case 4:
                    updateDialog("박사님: '어디서 팔지(트래픽처) 먼저 정하고 글을 써라!'");
                    score += 100;
                    if (score >= 500) { stage = 5; stageLabel.setText("STAGE 5: 시간 복사"); }
                    break;
                case 5:
                    updateDialog("박사님: '광고는 시간 복사 기술이다. 80원으로 데이터를 사라.'");
                    score += 1000;
                    if (score >= 3000) { stage = 6; stageLabel.setText("STAGE 6: 시스템 마트 운영"); }
                    break;
                case 6:
                    updateDialog("박사님: '종량제 지도로 손님을 모으고, CPA로 최종 가치를 전달하라.'");
                    score += 5000;
                    if (score >= 10000) { stage = 7; stageLabel.setText("STAGE 7: 공간적 자유"); }
                    break;
                case 7:
                    updateDialog("박사님: '고생했다. 이제 노트북을 덮고 안식을 누리게.'");
                    this.cameras.main.fade(2000, 0, 100, 0);
                    break;
            }
            scoreText.setText('REVENUE: $' + score.toFixed(2));
        }

        function updateDialog(txt) {
            dialogText.setText(txt);
        }
    </script>
</body>
</html>
