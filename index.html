<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Ad-Quest: The Core</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #050505; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 6px solid #222; box-shadow: 0 0 30px rgba(0,0,0,1); image-rendering: pixelated; }
    </style>
</head>
<body>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 500,
            height: 500,
            backgroundColor: '#0a0a0a',
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, master, cursors, score = 0, scoreText, stageText, dialogBox, dialogText;
        let currentStage = 1;

        function preload() {}

        function create() {
            // 1. 짤 특유의 어두운 바닥 타일 (픽셀 느낌)
            for (let i = 0; i < 10; i++) {
                for (let j = 0; j < 10; j++) {
                    let tile = this.add.rectangle(i * 50, j * 50, 48, 48, 0x111111).setOrigin(0);
                    if ((i + j) % 2 === 0) tile.setFillStyle(0x151515);
                }
            }

            // 2. 박사님 (짤처럼 위엄 있는 보스 느낌)
            master = this.add.container(250, 120);
            let masterBody = this.add.rectangle(0, 0, 40, 60, 0xccaa00).setStrokeStyle(2, 0xffffff);
            let masterEye = this.add.rectangle(0, -10, 30, 5, 0x000000); // 박사님의 날카로운 눈매
            master.add([masterBody, masterEye]);
            this.add.text(250, 70, 'MASTER AD-SENSE', { font: 'bold 16px Courier', fill: '#ccaa00' }).setOrigin(0.5);

            // 3. 주인공 (나)
            player = this.physics.add.container(250, 400);
            let playerBody = this.add.rectangle(0, 0, 30, 30, 0x00ff88).setStrokeStyle(2, 0xffffff);
            player.add(playerBody);
            player.setSize(30, 30);

            // 4. 상단 UI (세련된 마케터 스타일)
            scoreText = this.add.text(20, 20, 'REVENUE: $0.00', { font: '18px Courier', fill: '#00ff88' });
            stageText = this.add.text(20, 45, 'MISSION: 수련의 시작', { font: '12px Courier', fill: '#888' });

            // 5. 하단 대화창 (짤의 레이아웃)
            dialogBox = this.add.rectangle(250, 450, 460, 80, 0x000000).setAlpha(0.8).setStrokeStyle(2, 0x555555).setVisible(false);
            dialogText = this.add.text(250, 450, '', { font: '14px Courier', fill: '#ffffff', align: 'center', wordWrap: { width: 400 } }).setOrigin(0.5).setVisible(false);

            cursors = this.input.keyboard.createCursorKeys();
        }

        function update() {
            player.body.setVelocity(0);
            if (cursors.left.isDown) player.body.setVelocityX(-200);
            else if (cursors.right.isDown) player.body.setVelocityX(200);
            if (cursors.up.isDown) player.body.setVelocityY(-200);
            else if (cursors.down.isDown) player.body.setVelocityY(200);

            // 박사님 근처에 가면 자동 대화
            let dist = Phaser.Math.Distance.Between(player.x, player.y, master.x, master.y);
            if (dist < 80) {
                showMasterMessage();
            } else {
                hideDialog();
            }
        }

        function showMasterMessage() {
            dialogBox.setVisible(true);
            dialogText.setVisible(true);
            
            if (currentStage === 1) {
                dialogText.setText("박사님: '작가의 고집을 버려라. 클릭이 나지 않는 글은 죽은 글이다.' (Space 키로 수련)");
                if (Phaser.Input.Keyboard.JustDown(cursors.space)) {
                    score += 0.01;
                    if (score >= 0.05) { currentStage = 2; stageText.setText("MISSION: 낚싯대 던지기"); }
                }
            } else if (currentStage === 2) {
                dialogText.setText("박사님: '데이터를 믿어라. 낚싯대를 던져 O인지 X인지 확인해라.'");
                if (Phaser.Input.Keyboard.JustDown(cursors.space)) {
                    score += 50;
                    if (score >= 500) { currentStage = 3; stageText.setText("MISSION: 마트 자동화"); }
                }
            } else {
                dialogText.setText("박사님: '잘했다. 이제 시스템이 너를 자유케 하리라.'");
                score += 1000;
            }
            scoreText.setText('REVENUE: $' + score.toFixed(2));
        }

        function hideDialog() {
            dialogBox.setVisible(false);
            dialogText.setVisible(false);
        }
    </script>
</body>
</html>
