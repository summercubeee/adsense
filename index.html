<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>본질센스 RPG: 가짜 노력의 종말</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #444;
            image-rendering: pixelated;
            box-shadow: 0 0 40px rgba(0,0,0,1);
        }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 600,
    height: 600,
    pixelArt: true,
    backgroundColor: "#111111",
    physics: { default: "arcade", arcade: { debug: false } },
    scene: { preload, create, update }
};

const game = new Phaser.Game(config);

// 전역
let player, master, monster, itemSprite, bg, cursors, spaceKey;
let score = 0, stage = 1;
let scoreText, stageLabel, dialogBox, dialogText;

function preload() {
    // 디버그용
    this.load.on("filecomplete", (key) => {
        console.log("로드 성공:", key);
    });
    this.load.on("loaderror", (file) => {
        console.error("로드 실패:", file.key, file.src);
    });

    // 모든 캐릭터 시트: 704x384, 8x4 → 프레임 88x96
    this.load.spritesheet("player", "player.png", {
        frameWidth: 88,
        frameHeight: 96
    });

    this.load.spritesheet("master", "master.png", {
        frameWidth: 88,
        frameHeight: 96
    });

    // 몬스터/아이템/배경은 단일 이미지
    this.load.image("monster", "enemy_slime.png");

    this.load.image("bg_fishing", "bg_fishing.png");
    this.load.image("bg_dataroom", "bg_dataroom.png");
    this.load.image("bg_construction", "bg_construction.png");
    this.load.image("bg_engine", "bg_engine.png");
    this.load.image("bg_meadow", "bg_meadow.png");

    this.load.image("item_goggles", "item_goggles.png");
    this.load.image("item_stamp", "item_stamp.png");
}

function create() {
    const scene = this;

    // 배경 (처음: 낚시 수련장)
    bg = this.add.image(300, 300, "bg_fishing")
        .setDisplaySize(600, 600)
        .setAlpha(0.6);

    // 박사님 (master 시트 0번 프레임)
    master = this.physics.add.sprite(300, 150, "master", 0);
    master.setImmovable(true);

    this.add.text(300, 80, "MASTER", {
        font: "bold 16px Courier",
        fill: "#ffcc00"
    }).setOrigin(0.5);

    // 플레이어 애니메이션 (8x4 시트에서 방향별로 4프레임씩 사용한다고 가정)
    this.anims.create({
        key: "down",
        frames: this.anims.generateFrameNumbers("player", { start: 0, end: 3 }),
        frameRate: 10,
        repeat: -1
    });
    this.anims.create({
        key: "left",
        frames: this.anims.generateFrameNumbers("player", { start: 8, end: 11 }),
        frameRate: 10,
        repeat: -1
    });
    this.anims.create({
        key: "right",
        frames: this.anims.generateFrameNumbers("player", { start: 16, end: 19 }),
        frameRate: 10,
        repeat: -1
    });
    this.anims.create({
        key: "up",
        frames: this.anims.generateFrameNumbers("player", { start: 24, end: 27 }),
        frameRate: 10,
        repeat: -1
    });

    // 플레이어
    player = this.physics.add.sprite(300, 450, "player", 0);
    player.setCollideWorldBounds(true);

    // 몬스터 (초기엔 화면 밖)
    monster = this.physics.add.sprite(1000, 1000, "monster");
    monster.setScale(1.2);

    // 아이템
    itemSprite = this.add.image(300, 300, "item_goggles")
        .setVisible(false)
        .setAlpha(1);

    // UI
    scoreText = this.add.text(20, 20, "REVENUE: $0.00", {
        font: "bold 24px Courier",
        fill: "#00ff88"
    });

    stageLabel = this.add.text(20, 55, "STAGE 1: 정석 수련", {
        font: "14px Courier",
        fill: "#aaa"
    });

    dialogBox = this.add.rectangle(300, 530, 560, 100, 0x000000)
        .setAlpha(0.85)
        .setStrokeStyle(2, 0x00ff88);

    dialogText = this.add.text(
        300,
        530,
        "박사님: '수련을 시작하게. 가까이 와서 [Space]를 누르게.'",
        {
            font: "14px Courier",
            fill: "#ffffff",
            align: "center",
            wordWrap: { width: 500 }
        }
    ).setOrigin(0.5);

    // 입력
    cursors = this.input.keyboard.createCursorKeys();
    spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

    console.log("create 완료");
}

function update() {
    if (!player || !cursors) return;

    player.setVelocity(0);

    if (cursors.left.isDown) {
        player.setVelocityX(-160);
        player.anims.play("left", true);
    } else if (cursors.right.isDown) {
        player.setVelocityX(160);
        player.anims.play("right", true);
    } else if (cursors.up.isDown) {
        player.setVelocityY(-160);
        player.anims.play("up", true);
    } else if (cursors.down.isDown) {
        player.setVelocityY(160);
        player.anims.play("down", true);
    } else {
        player.anims.stop();
    }

    if (Phaser.Input.Keyboard.JustDown(spaceKey)) {
        checkInteraction();
    }
}

function checkInteraction() {
    const scene = game.scene.scenes[0];

    const distMaster = Phaser.Math.Distance.Between(player.x, player.y, master.x, master.y);
    const distMonster = Phaser.Math.Distance.Between(player.x, player.y, monster.x, monster.y);

    if (distMaster < 100) {
        runStageDialogue();
    } else if (stage === 2 && distMonster < 120) {
        updateDialog("슬라임 몬스터: '난 100만 검색량이다! 데이터 없는 네 노가다는 내 HP를 깎을 수 없다!'");
        scene.cameras.main.shake(200, 0.01);

        scene.time.delayedCall(2500, () => {
            stage = 3;
            stageLabel.setText("STAGE 3: 마켓 데이터 룸");
            bg.setTexture("bg_dataroom");
            monster.setPosition(1000, 1000);

            itemSprite
                .setTexture("item_goggles")
                .setPosition(player.x, player.y - 50)
                .setVisible(true)
                .setAlpha(1);

            scene.tweens.add({
                targets: itemSprite,
                y: player.y - 80,
                alpha: 0,
                duration: 2000,
                onComplete: () => itemSprite.setVisible(false)
            });

            updateDialog("박사님: '보았는가? 데이터 안경을 끼고 진짜 O, X를 구분하게.'");
        });
    }
}

function runStageDialogue() {
    const scene = game.scene.scenes[0];

    switch (stage) {
        case 1:
            updateDialog("박사님: '글은 인격이다. 검색자가 원하는 정보를 정확히 적어라.'");
            score += 0.01;
            if (score >= 0.05) {
                stage = 2;
                monster.setPosition(150, 300);
                stageLabel.setText("STAGE 2: 가짜 노력의 습격");
            }
            break;

        case 2:
            updateDialog("박사님: '슬라임에게 다가가 현실 검증을 받아보게.'");
            break;

        case 3:
            updateDialog("박사님: '데이터가 O라고 하는 곳에 네 모든 힘을 쏟아부어라.'");
            score += 10;
            if (score >= 50) {
                stage = 4;
                bg.setTexture("bg_construction");
                stageLabel.setText("STAGE 4: 마트 설계 (마케터 전직)");
            }
            break;

        case 4:
            updateDialog("박사님: '어디서 팔지 먼저 정하고, 종량제 입구를 설계하라!'");
            score += 100;
            if (score >= 500) {
                stage = 5;
                stageLabel.setText("STAGE 5: 시간 복사");
            }
            break;

        case 5:
            updateDialog("박사님: '유료 광고는 시간 복사 기술이다. 80원으로 데이터를 사라.'");
            score += 1000;
            if (score >= 3000) {
                stage = 6;
                bg.setTexture("bg_engine");
                stageLabel.setText("STAGE 6: 시스템 무한동력");
            }
            break;

        case 6:
            updateDialog("박사님: '자동화 시스템이 작동한다. 쉬운 유입을 고단가 CPA로 연결하라!'");
            score += 5000;
            if (score >= 10000) {
                stage = 7;
                bg.setTexture("bg_meadow");
                stageLabel.setText("STAGE 7: 공간적 자유");

                itemSprite
                    .setTexture("item_stamp")
                    .setPosition(player.x, player.y - 50)
                    .setVisible(true)
                    .setAlpha(1);

                scene.tweens.add({
                    targets: itemSprite,
                    y: player.y - 80,
                    alpha: 0,
                    duration: 2000,
                    onComplete: () => itemSprite.setVisible(false)
                });
            }
            break;

        case 7:
            updateDialog("박사님: '이 O/X 도장으로 먼저 팔아보고 확장하라. 이제 노트북을 덮게.'");
            scene.cameras.main.fade(3000, 0, 0, 0);
            break;
    }

    scoreText.setText("REVENUE: $" + score.toFixed(2));
}

function updateDialog(txt) {
    dialogText.setText(txt);
}
</script>
</body>
</html>
