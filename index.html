<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>본질센스 RPG: 가짜 노력의 종말</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #444;
            image-rendering: pixelated; /* 도트 그래픽이 깨지지 않게 설정 */
            box-shadow: 0 0 40px rgba(0,0,0,1);
        }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 600,
    height: 600,
    pixelArt: true,
    backgroundColor: "#111111",
    physics: { default: "arcade", arcade: { debug: false } },
    scene: { preload, create, update }
};

const game = new Phaser.Game(config);

let player, master, monster, itemSprite, bg, cursors, spaceKey;
let score = 0, stage = 1;
let scoreText, stageLabel, dialogBox, dialogText;

function preload() {
    // 1. Phaser 공식 테스트 랩의 안전한 외부 이미지들 사용
    // 플레이어: 32x48 크기의 9프레임 애니메이션 시트
    this.load.spritesheet("player", "https://labs.phaser.io/assets/sprites/dude.png", {
        frameWidth: 32,
        frameHeight: 48
    });
    
    // 마스터: 단일 도트 캐릭터
    this.load.image("master", "https://labs.phaser.io/assets/sprites/phaser-dude.png");
    
    // 몬스터: 슬라임 느낌의 몬스터
    this.load.image("monster", "https://labs.phaser.io/assets/sprites/space-baddie.png");

    // 배경들
    this.load.image("bg_fishing", "https://labs.phaser.io/assets/skies/underwater1.png");
    this.load.image("bg_dataroom", "https://labs.phaser.io/assets/skies/deepblue.png");
    this.load.image("bg_construction", "https://labs.phaser.io/assets/skies/toxic.png");
    this.load.image("bg_engine", "https://labs.phaser.io/assets/skies/space2.png");
    this.load.image("bg_meadow", "https://labs.phaser.io/assets/skies/sky4.png");

    // 아이템들
    this.load.image("item_goggles", "https://labs.phaser.io/assets/sprites/diamond.png");
    this.load.image("item_stamp", "https://labs.phaser.io/assets/sprites/star.png");
}

function create() {
    const scene = this;

    // 배경 설정 (화면 크기에 맞춤)
    bg = this.add.image(300, 300, "bg_fishing")
        .setDisplaySize(600, 600)
        .setAlpha(0.6);

    // 마스터 배치 및 크기 키우기
    master = this.physics.add.sprite(300, 150, "master");
    master.setScale(1.5);
    master.setImmovable(true);

    this.add.text(300, 100, "MASTER", {
        font: "bold 16px Courier",
        fill: "#ffcc00"
    }).setOrigin(0.5);

    // 플레이어 애니메이션 생성 (dude.png 구조에 맞춤: 왼쪽 0~3, 정면 4, 오른쪽 5~8)
    this.anims.create({
        key: "left",
        frames: this.anims.generateFrameNumbers("player", { start: 0, end: 3 }),
        frameRate: 10,
        repeat: -1
    });
    this.anims.create({
        key: "turn",
        frames: [ { key: "player", frame: 4 } ],
        frameRate: 20
    });
    this.anims.create({
        key: "right",
        frames: this.anims.generateFrameNumbers("player", { start: 5, end: 8 }),
        frameRate: 10,
        repeat: -1
    });

    // 플레이어 배치 및 크기 키우기
    player = this.physics.add.sprite(300, 450, "player");
    player.setScale(1.5);
    player.setCollideWorldBounds(true);

    // 몬스터 (초기에는 화면 밖)
    monster = this.physics.add.sprite(1000, 1000, "monster");
    monster.setScale(1.5);

    // 아이템 (초기에는 숨김)
    itemSprite = this.add.image(300, 300, "item_goggles")
        .setScale(1.5)
        .setVisible(false);

    // UI 텍스트들
    scoreText = this.add.text(20, 20, "REVENUE: $0.00", {
        font: "bold 24px Courier",
        fill: "#00ff88",
        stroke: "#000",
        strokeThickness: 4
    });

    stageLabel = this.add.text(20, 55, "STAGE 1: 정석 수련", {
        font: "bold 16px Courier",
        fill: "#ffffff",
        stroke: "#000",
        strokeThickness: 3
    });

    dialogBox = this.add.rectangle(300, 530, 560, 100, 0x000000)
        .setAlpha(0.85)
        .setStrokeStyle(2, 0x00ff88);

    dialogText = this.add.text(
        300, 530,
        "박사님: '수련을 시작하게. 가까이 와서 [Space]를 누르게.'",
        { font: "15px Courier", fill: "#ffffff", align: "center", wordWrap: { width: 520 } }
    ).setOrigin(0.5);

    // 키보드 입력 설정
    cursors = this.input.keyboard.createCursorKeys();
    spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
}

function update() {
    if (!player || !cursors) return;

    player.setVelocity(0);

    // 이동 및 애니메이션 (새로운 이미지 구조에 맞춤)
    if (cursors.left.isDown) {
        player.setVelocityX(-160);
        player.anims.play("left", true);
    } else if (cursors.right.isDown) {
        player.setVelocityX(160);
        player.anims.play("right", true);
    } else if (cursors.up.isDown) {
        player.setVelocityY(-160);
        player.anims.play("turn", true); // 위아래 이미지가 없으므로 정면
    } else if (cursors.down.isDown) {
        player.setVelocityY(160);
        player.anims.play("turn", true);
    } else {
        player.anims.play("turn", true); // 멈췄을 때 정면
    }

    // 상호작용 키(Space)
    if (Phaser.Input.Keyboard.JustDown(spaceKey)) {
        checkInteraction();
    }
}

function checkInteraction() {
    const scene = game.scene.scenes[0];
    const distMaster = Phaser.Math.Distance.Between(player.x, player.y, master.x, master.y);
    const distMonster = Phaser.Math.Distance.Between(player.x, player.y, monster.x, monster.y);

    // 마스터(NPC) 근처일 때
    if (distMaster < 100) {
        runStageDialogue();
    } 
    // STAGE 2에서 몬스터 근처일 때
    else if (stage === 2 && distMonster < 120) {
        updateDialog("몬스터: '난 100만 검색량이다! 데이터 없는 네 노가다는 내 HP를 깎을 수 없다!'");
        scene.cameras.main.shake(200, 0.01);

        scene.time.delayedCall(2500, () => {
            stage = 3;
            stageLabel.setText("STAGE 3: 마켓 데이터 룸");
            bg.setTexture("bg_dataroom");
            monster.setPosition(1000, 1000); // 몬스터 퇴장

            // 아이템 획득 연출
            itemSprite.setTexture("item_goggles")
                .setPosition(player.x, player.y - 50)
                .setVisible(true)
                .setAlpha(1);

            scene.tweens.add({
                targets: itemSprite,
                y: player.y - 80,
                alpha: 0,
                duration: 2000,
                onComplete: () => itemSprite.setVisible(false)
            });

            updateDialog("박사님: '보았는가? 다이아몬드(데이터) 안경을 끼고 진짜 O, X를 구분하게.'");
        });
    }
}

function runStageDialogue() {
    const scene = game.scene.scenes[0];

    switch (stage) {
        case 1:
            updateDialog("박사님: '글은 인격이다. 검색자가 원하는 정보를 정확히 적어라.'");
            score += 0.01;
            if (score >= 0.05) {
                stage = 2;
                monster.setPosition(150, 300);
                stageLabel.setText("STAGE 2: 가짜 노력의 습격");
            }
            break;
        case 2:
            updateDialog("박사님: '저기 있는 몬스터에게 다가가 현실 검증을 받아보게.'");
            break;
        case 3:
            updateDialog("박사님: '데이터가 O라고 하는 곳에 네 모든 힘을 쏟아부어라.'");
            score += 10;
            if (score >= 50) {
                stage = 4;
                bg.setTexture("bg_construction");
                stageLabel.setText("STAGE 4: 마트 설계 (마케터 전직)");
            }
            break;
        case 4:
            updateDialog("박사님: '어디서 팔지 먼저 정하고, 종량제 입구를 설계하라!'");
            score += 100;
            if (score >= 500) {
                stage = 5;
                stageLabel.setText("STAGE 5: 시간 복사");
            }
            break;
        case 5:
            updateDialog("박사님: '유료 광고는 시간 복사 기술이다. 80원으로 데이터를 사라.'");
            score += 1000;
            if (score >= 3000) {
                stage = 6;
                bg.setTexture("bg_engine");
                stageLabel.setText("STAGE 6: 시스템 무한동력");
            }
            break;
        case 6:
            updateDialog("박사님: '자동화 시스템이 작동한다. 쉬운 유입을 고단가 CPA로 연결하라!'");
            score += 5000;
            if (score >= 10000) {
                stage = 7;
                bg.setTexture("bg_meadow");
                stageLabel.setText("STAGE 7: 공간적 자유");

                itemSprite.setTexture("item_stamp")
                    .setPosition(player.x, player.y - 50)
                    .setVisible(true)
                    .setAlpha(1);

                scene.tweens.add({
                    targets: itemSprite,
                    y: player.y - 80,
                    alpha: 0,
                    duration: 2000,
                    onComplete: () => itemSprite.setVisible(false)
                });
            }
            break;
        case 7:
            updateDialog("박사님: '이 별 도장으로 먼저 팔아보고 확장하라. 이제 노트북을 덮게.'");
            scene.cameras.main.fade(3000, 0, 0, 0);
            break;
    }
    scoreText.setText("REVENUE: $" + score.toFixed(2));
}

function updateDialog(txt) {
    dialogText.setText(txt);
}
</script>
</body>
</html>
