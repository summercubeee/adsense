<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>본질센스 RPG: 가짜 노력의 종말</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a0f;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'Satoshi',sans-serif;}
    #wrap{position:relative;width:600px;height:600px;}
    canvas{display:block;image-rendering:pixelated;}
    #ui{position:absolute;inset:0;pointer-events:none;}
    #hud{position:absolute;top:12px;left:12px;}
    #revenue{font-size:22px;font-weight:700;color:#00ff99;text-shadow:0 0 10px #00ff9966;font-variant-numeric:tabular-nums;}
    #stage-label{font-size:13px;color:#aaa;margin-top:3px;}
    #dialog-box{position:absolute;bottom:12px;left:12px;right:12px;background:rgba(0,0,0,.85);border:1.5px solid #00ff99;border-radius:8px;padding:12px 16px;}
    #dialog-text{font-size:14px;color:#eee;line-height:1.6;}
    #controls-hint{position:absolute;top:12px;right:12px;font-size:11px;color:#555;text-align:right;line-height:1.8;}
    #start-screen{position:absolute;inset:0;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;pointer-events:auto;}
    #start-screen h1{font-size:28px;font-weight:700;color:#00ff99;text-align:center;line-height:1.3;text-shadow:0 0 20px #00ff9944;}
    #start-screen p{font-size:14px;color:#aaa;text-align:center;max-width:360px;line-height:1.7;}
    #start-btn{background:#00ff99;color:#0a0a0f;border:none;border-radius:6px;padding:12px 36px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Satoshi',sans-serif;transition:transform .15s;}
    #start-btn:hover{transform:scale(1.05);}
  </style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="600" height="600"></canvas>
  <div id="ui">
    <div id="hud">
      <div id="revenue">REVENUE: $0.00</div>
      <div id="stage-label">STAGE 1: 낚싯대 던지기</div>
    </div>
    <div id="controls-hint">방향키: 이동<br>SPACE: 대화 / 실행</div>
    <div id="dialog-box">
      <div id="dialog-text">박사님에게 다가가서 [Space]로 조언을 구하세요.</div>
    </div>
  </div>
  <div id="start-screen">
    <h1>본질센스 RPG<br>가짜 노력의 종말</h1>
    <p>박사님의 말만 듣는다고 돈이 벌리지 않습니다.<br>직접 행동(Space)하여 수익을 창출하십시오.</p>
    <button id="start-btn">▶ 게임 시작</button>
  </div>
</div>

<script>
// ── 상수 및 캔버스 ──────────────────────────────────────────
const W = 600, H = 600;
const SPEED = 160;
const INTERACT_DIST = 90;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ── 에셋 로더 (안전 모드 적용) ───────────────────────────────────
const images = {};
const assetList = {
  player: 'player.png.jpg',
  master: 'master.png.jpg',
  monster: 'enemy_slime.png.jpg',
  bg_fishing: 'bg_fishing.png.jpg',
  bg_dataroom: 'bg_dataroom.png.jpg',
  bg_construction: 'bg_construction.png.jpg',
  bg_engine: 'bg_engine.png.jpg',
  bg_meadow: 'bg_meadow.png.jpg',
  item_goggles: 'item_goggles.png.jpg',
  item_stamp: 'item_stamp.png.jpg'
};

let assetsLoaded = 0;
const totalAssets = Object.keys(assetList).length;

for(const [key, src] of Object.entries(assetList)) {
  const img = new Image();
  img.onload = () => { assetsLoaded++; };
  img.src = src;
  images[key] = img;
}

// ── 게임 상태 ─────────────────────────────────────
const state = {
  phase: 'start',
  stage: 1,
  score: 0,
  player: { x: 300, y: 450, w:40, h:40 },
  master: { x: 300, y: 150, w:50, h:70 },
  monster: { x: -200, y: -200, alive: false, shake: 0 },
  item: { x: 0, y: 0, visible: false, alpha: 0, vy: 0, img: null },
  bgDecor: 'bg_fishing',
  camShake: 0,
};

// ── 액션 타겟 (플레이어가 상호작용해야 할 위치) ───
const TARGETS = {
  1: { x: 300, y: 350, name: '낚시터', hint: '[Space] 낚싯대 던지기' },
  2: { x: -100, y: -100, name: '몬스터', hint: '[Space] 대형 키워드와 대결' }, // 몬스터가 타겟이 됨
  3: { x: 150, y: 250, name: '데이터 단말기', hint: '[Space] 시장 데이터 확인' },
  4: { x: 450, y: 300, name: '건설 도면', hint: '[Space] 종량제 입구 설계' },
  5: { x: 300, y: 300, name: '메인 엔진', hint: '[Space] 광고 가동 (시간 복사)' },
  6: { x: 300, y: 350, name: 'CPA 포탑', hint: '[Space] 클릭 유도 설계' },
  7: { x: 450, y: 400, name: '로그아웃', hint: '[Space] 프리셀 확인 및 안식' },
};

// ── 스테이지별 박사님 대사 ───
const MASTER_DIALOGS = {
  1: "박사님: '내 말만 듣는다고 돈이 벌리지 않네. 저기 물가(초록색 원)로 가서 직접 낚싯대를 던져보게.'",
  2: "박사님: '대형 키워드의 함정이다! 저 슬라임에게 부딪혀서 네 노가다가 얼마나 무력한지 확인해보게.'",
  3: "박사님: '데이터 룸이네. 좌측의 단말기에서 가볍게 글을 써서 시장의 반응(Pretotype)을 확인하게.'",
  4: "박사님: '우측의 건설 도면을 보게. 이제 수단과 방법을 가리지 않고 트래픽을 몰아넣어라!'",
  5: "박사님: '중앙의 엔진을 가동하게. [고유가] 대신 [전쟁 지원금]! 틈새로 연금을 구축하라.'",
  6: "박사님: '잘 쓴 글의 본질은 광고 클릭이네. 중앙의 포탑을 가동해 클릭 동선을 완성하게.'",
  7: "박사님: '훌륭하네. 우측에서 O/X 도장을 찍어 최종 확인을 하고, 이제 노트북을 덮게나.'"
};

// ── 입력 ──────────────────────────────────────────
const Input = { keys: {}, justPressed: {} };
document.addEventListener('keydown', e => {
  if (!Input.keys[e.code]) Input.justPressed[e.code] = true;
  Input.keys[e.code] = true;
  e.preventDefault();
});
document.addEventListener('keyup', e => { Input.keys[e.code] = false; });

// ── 렌더링 ─────────────────────────────────────
function render(){
  ctx.clearRect(0,0,W,H);
  if(state.phase==='start') return;

  const sx=(Math.random()-.5)*state.camShake*6;
  const sy=(Math.random()-.5)*state.camShake*6;
  ctx.save();
  if(state.camShake>0){ ctx.translate(sx,sy); state.camShake=Math.max(0,state.camShake-0.05); }

  // 1. 배경 이미지
  const bgImg = images[state.bgDecor];
  if(bgImg && bgImg.complete) {
    ctx.globalAlpha = 0.6;
    ctx.drawImage(bgImg, 0, 0, W, H);
    ctx.globalAlpha = 1.0;
  }

  // 2. 액션 타겟 표시 (박동하는 초록색 원형)
  const target = TARGETS[state.stage];
  if(target && state.stage !== 2) { // 스테이지 2는 몬스터가 타겟
    const pulse = Math.abs(Math.sin(Date.now()/300));
    ctx.beginPath();
    ctx.arc(target.x, target.y, 25 + pulse*10, 0, Math.PI*2);
    ctx.fillStyle = `rgba(0, 255, 153, ${0.2 + pulse*0.3})`;
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#00ff99';
    ctx.stroke();
    
    // 근처에 가면 힌트 텍스트
    const dTarget = Math.hypot(state.player.x - target.x, state.player.y - target.y);
    if(dTarget < 80) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px Satoshi';
      ctx.textAlign = 'center';
      ctx.fillText(target.hint, target.x, target.y - 45);
    }
  }

  // 3. 박사님
  const m = state.master;
  if(images.master && images.master.complete) {
    ctx.drawImage(images.master, m.x - m.w/2, m.y - m.h/2, m.w, m.h);
  }
  ctx.fillStyle='#ffcc00'; ctx.font='bold 12px Satoshi'; ctx.textAlign='center';
  ctx.fillText
