<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>본질센스 RPG: 수익화 공식의 완성</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:#0a0a0f;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      overflow:hidden;
      font-family:'Satoshi',sans-serif;
    }
    #wrap{
      position:relative;
      width:600px;
      height:600px;
      box-shadow:0 0 50px rgba(0,255,153,0.15);
    }
    canvas{display:block;image-rendering:pixelated;border-radius:4px}
    #ui{position:absolute;inset:0;pointer-events:none}
    #hud{position:absolute;top:16px;left:16px}
    #revenue{
      font-size:26px;font-weight:700;color:#00ff99;
      text-shadow:0 0 12px rgba(0,255,153,0.5);
      font-variant-numeric:tabular-nums;letter-spacing:-0.5px;
    }
    #stage-label{
      font-size:14px;color:#cbd5e1;margin-top:6px;font-weight:700;letter-spacing:0.5px;
    }
    #meta-label{
      margin-top:8px;font-size:12px;line-height:1.7;color:#94a3b8;
      background:rgba(0,0,0,0.38);padding:8px 10px;border-radius:6px;
      white-space:pre-line;
    }
    #dialog-box{
      position:absolute;bottom:16px;left:16px;right:16px;
      background:rgba(10,15,25,0.95);
      border:2px solid #00ff99;border-radius:8px;padding:16px 20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.8);
    }
    #dialog-speaker{
      font-size:13px;color:#00ff99;font-weight:700;margin-bottom:6px;text-transform:uppercase;
    }
    #dialog-text{
      font-size:15px;color:#f8fafc;line-height:1.6;font-weight:400;
    }
    #controls-hint{
      position:absolute;top:16px;right:16px;font-size:12px;color:#94a3b8;
      text-align:right;line-height:1.8;background:rgba(0,0,0,0.5);
      padding:8px 12px;border-radius:6px;
    }
    #start-screen{
      position:absolute;inset:0;background:rgba(5,10,15,0.95);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:20px;pointer-events:auto;z-index:10;
    }
    #start-screen h1{
      font-size:32px;font-weight:700;color:#00ff99;text-align:center;
      line-height:1.3;text-shadow:0 0 24px rgba(0,255,153,0.4);
    }
    #start-screen p{
      font-size:15px;color:#94a3b8;text-align:center;max-width:430px;line-height:1.7;
    }
    #start-btn{
      background:#00ff99;color:#050a0f;border:none;border-radius:6px;
      padding:14px 40px;font-size:18px;font-weight:700;cursor:pointer;
      font-family:'Satoshi',sans-serif;transition:all .2s;
      box-shadow:0 4px 15px rgba(0,255,153,0.3);
    }
    #start-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 6px 20px rgba(0,255,153,0.5);
    }
    #fps{
      position:absolute;bottom:12px;right:12px;font:11px monospace;color:#475569;pointer-events:none;
    }
  </style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="600" height="600"></canvas>
  <div id="ui">
    <div id="hud">
      <div id="revenue">REVENUE: $0.00</div>
      <div id="stage-label">STAGE 1: 잠재 트래픽 감지</div>
      <div id="meta-label">수: 0 | 단가: $1.00 | 잠재력: 0 | 노출: 0 | 유입 사유: 0</div>
    </div>

    <div id="controls-hint">
      방향키: 이동<br>
      SPACE: 상호작용
    </div>

    <div id="dialog-box">
      <div id="dialog-speaker">시스템 알림</div>
      <div id="dialog-text">방향키로 박사님께 다가가 SPACE를 눌러 수익화 공식을 배우십시오.</div>
    </div>

    <div id="fps"></div>
  </div>

  <div id="start-screen">
    <h1>본질센스 RPG<br>수익화 공식의 완성</h1>
    <p>
      수익은 운이 아니라 설계입니다.<br>
      잠재 트래픽, 노출 가능성, 유입 사유를 직접 체험하며 수익 공식을 완성하십시오.
    </p>
    <button id="start-btn">▶ 시스템 가동</button>
  </div>
</div>

<script>
const W = 600, H = 600;
const SPEED = 180;
const INTERACT_DIST = 72;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const state = {
  phase: 'start',
  stage: 1,
  score: 0,
  traffic: 0,
  cpc: 1.0,
  keywordPotential: 0,
  exposureScore: 0,
  clickAppeal: 0,
  risk: 0,
  player: { x: 300, y: 470, dir: 0, frame: 0, frameTimer: 0 },
  master: { x: 300, y: 120 },
  monster: { x: -200, y: -200, alive: false, shake: 0, hits: 0 },
  bgDecor: 'fishing',
  camShake: 0,
  stageFlags: {},
  targets: []
};

const Input = { keys:{}, justPressed:{} };
document.addEventListener('keydown', e=>{
  if(!Input.keys[e.code]) Input.justPressed[e.code] = true;
  Input.keys[e.code] = true;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space','KeyA','KeyD','KeyW','KeyS'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e=>{ Input.keys[e.code] = false; });

const bgPalettes = {
  fishing:      { sky:'#0d1b2a', ground:'#1a3a2a', accent:'#1e4d6b' },
  dataroom:     { sky:'#0a0f1a', ground:'#0f1f2f', accent:'#1b2f4d' },
  construction: { sky:'#2a1a0a', ground:'#3a2a1a', accent:'#5c3b1e' },
  engine:       { sky:'#0f0f18', ground:'#181830', accent:'#2a2a50' },
  meadow:       { sky:'#1a3020', ground:'#2a4a2a', accent:'#3a6040' }
};

function drawRect(x,y,w,h,col,a=1){
  ctx.globalAlpha=a; ctx.fillStyle=col; ctx.fillRect(x,y,w,h); ctx.globalAlpha=1;
}
function drawRoundRect(x,y,w,h,r,col,a=1){
  ctx.globalAlpha=a; ctx.fillStyle=col; ctx.beginPath(); ctx.roundRect(x,y,w,h,r); ctx.fill(); ctx.globalAlpha=1;
}
function renderText(txt, x, y, size, col, align='center', bold=false){
  ctx.fillStyle = col;
  ctx.textAlign = align;
  ctx.font = `${bold ? 'bold ' : ''}${size}px Satoshi, sans-serif`;
  ctx.fillText(txt, x, y);
}

function drawBackground(){
  const p = bgPalettes[state.bgDecor] || bgPalettes.fishing;
  drawRect(0,0,W,H*0.55,p.sky);
  const grad = ctx.createLinearGradient(0,H*0.45,0,H*0.65);
  grad.addColorStop(0,p.accent);
  grad.addColorStop(1,p.ground);
  ctx.fillStyle = grad;
  ctx.fillRect(0,H*0.45,W,H*0.2);
  drawRect(0,H*0.62,W,H*0.38,p.ground);
  drawBgDecor();
}

function drawBgDecor(){
  const d = state.bgDecor;
  ctx.save();
  if(d==='fishing'){
    ctx.fillStyle='#0d3350';
    ctx.beginPath(); ctx.ellipse(300,320,240,60,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#3a8fbf44'; ctx.lineWidth=1;
    for(let i=0;i<6;i++){
      ctx.beginPath();
      ctx.moveTo(150+i*40,315);
      ctx.lineTo(180+i*40,315);
      ctx.stroke();
    }
  } else if(d==='dataroom'){
    for(let i=0;i<4;i++){
      drawRoundRect(60+i*130,160,80,180,4,'#111a2a');
      for(let j=0;j<7;j++){
        ctx.fillStyle = Math.random()>.4 ? '#00ff88' : '#1a3a2a';
        ctx.fillRect(70+i*130,175+j*24,10,8);
      }
    }
  } else if(d==='construction'){
    const bld=[[40,180,90,270],[160,130,70,330],[260,160,100,300],[400,100,80,360],[510,180,60,280]];
    bld.forEach(([x,y,w,h])=>{
      ctx.fillStyle='#1a0f00';
      ctx.fillRect(x,y,w,h);
      ctx.fillStyle='#ffcc6633';
      for(let r=0;r<5;r++) for(let c=0;c<2;c++) ctx.fillRect(x+10+c*20,y+15+r*35,12,14);
    });
  } else if(d==='engine'){
    ctx.strokeStyle='#3a3a6a'; ctx.lineWidth=2;
    for(let i=0;i<5;i++){
      ctx.beginPath(); ctx.moveTo(i*130,0); ctx.lineTo(i*130,H); ctx.stroke();
    }
    for(let j=0;j<5;j++){
      ctx.beginPath(); ctx.moveTo(0,j*130); ctx.lineTo(W,j*130); ctx.stroke();
    }
    [[160,220],[420,300],[280,380]].forEach(([cx,cy])=>{
      ctx.strokeStyle='#5050aa77'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(cx,cy,45,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx,cy,20,0,Math.PI*2); ctx.stroke();
    });
  } else if(d==='meadow'){
    ctx.fillStyle='#3a8040';
    for(let i=0;i<40;i++){
      const gx=60+i*14, gy=H*0.6+Math.sin(i)*8;
      ctx.fillRect(gx,gy,4,12+Math.abs(Math.sin(i*2))*10);
    }
    ctx.fillStyle='#ffdd44aa'; ctx.beginPath(); ctx.arc(500,100,40,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffcc2244'; ctx.beginPath(); ctx.arc(500,100,60,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

const PLAYER_COLORS = { hair:'#1e293b', skin:'#fcd34d', shirt:'#0ea5e9', pants:'#0f172a', shoes:'#020617', eye:'#0f172a', shadow:'#00000055' };
const MASTER_COLORS = { hair:'#94a3b8', skin:'#fcd34d', shirt:'#64748b', pants:'#334155', shoes:'#0f172a', eye:'#f8fafc', shadow:'#00000055' };

function drawPixelChar(cx, cy, dir, frame, isPlayer){
  const c = isPlayer ? PLAYER_COLORS : MASTER_COLORS;

  ctx.fillStyle=c.shadow;
  ctx.beginPath(); ctx.ellipse(cx,cy+14,16,5,0,0,Math.PI*2); ctx.fill();

  ctx.save();
  if(dir===1){
    ctx.translate(cx,cy);
    ctx.scale(-1,1);
    ctx.translate(-cx,-cy);
  }

  const legSwing = Math.sin(frame*Math.PI/2)*4;
  const armSwing = Math.sin(frame*Math.PI/2)*5;

  ctx.fillStyle=c.shoes;
  ctx.fillRect(cx-7,cy+6+legSwing,7,5);
  ctx.fillRect(cx+2,cy+6-legSwing,7,5);

  ctx.fillStyle=c.pants;
  ctx.fillRect(cx-7,cy-5,7,10);
  ctx.fillRect(cx+2,cy-5,7,10);

  ctx.fillStyle=c.shirt;
  ctx.fillRect(cx-10,cy-24,20,20);
  ctx.fillRect(cx-14,cy-22+armSwing,5,14);
  ctx.fillRect(cx+10,cy-22-armSwing,5,14);

  ctx.fillStyle=c.skin;
  ctx.fillRect(cx-14,cy-8+armSwing,5,5);
  ctx.fillRect(cx+10,cy-8-armSwing,5,5);

  ctx.fillRect(cx-9,cy-42,18,18);

  ctx.fillStyle=c.hair;
  ctx.fillRect(cx-10,cy-44,20,7);
  ctx.fillRect(cx-12,cy-42,3,12);
  ctx.fillRect(cx+9,cy-42,3,10);

  ctx.fillStyle=c.eye;
  ctx.fillRect(cx-5,cy-34,4,4);
  ctx.fillRect(cx+3,cy-34,4,4);

  if(isPlayer){
    ctx.fillStyle='#fff';
    ctx.fillRect(cx-4,cy-35,2,2);
    ctx.fillRect(cx+4,cy-35,2,2);
  }
  ctx.restore();
}

function drawMaster(){
  const m = state.master;
  drawPixelChar(m.x,m.y,0,0,false);
  ctx.fillStyle='rgba(0,0,0,.7)';
  ctx.beginPath(); ctx.roundRect(m.x-36,m.y-70,72,20,4); ctx.fill();
  renderText('박사님', m.x, m.y-56, 12, '#00ff99', 'center', true);

  if(Math.hypot(state.player.x-m.x, state.player.y-m.y) < INTERACT_DIST){
    ctx.fillStyle='rgba(0,255,153,.2)';
    ctx.beginPath(); ctx.ellipse(m.x,m.y+14,24,8,0,0,Math.PI*2); ctx.fill();
    renderText('[SPACE] 대화', m.x, m.y-78, 11, '#00ff99', 'center', true);
  }
}

function drawMonster(){
  const mon = state.monster;
  if(!mon.alive) return;

  const t = Date.now()/400;
  const bx = mon.x + Math.sin(mon.shake*15)*mon.shake*10;
  const by = mon.y + Math.sin(t)*6;

  ctx.fillStyle='#00000044';
  ctx.beginPath(); ctx.ellipse(bx,by+35,30,8,0,0,Math.PI*2); ctx.fill();

  ctx.fillStyle='#ef4444';
  ctx.beginPath(); ctx.ellipse(bx,by,32,28,0,0,Math.PI*2); ctx.fill();

  ctx.fillStyle='#fca5a5';
  ctx.beginPath(); ctx.ellipse(bx-10,by-10,12,8,-.4,0,Math.PI*2); ctx.fill();

  ctx.fillStyle='#0f172a';
  ctx.beginPath(); ctx.arc(bx-12,by-6,6,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx+12,by-6,6,0,Math.PI*2); ctx.fill();

  ctx.fillStyle='#fff';
  ctx.fillRect(bx-14,by-8,3,3);
  ctx.fillRect(bx+10,by-8,3,3);

  ctx.strokeStyle='#0f172a'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(bx,by+8,12,0.1,Math.PI-.1); ctx.stroke();

  renderText('대형 키워드 몬스터', bx, by-40, 12, '#ef4444', 'center', true);

  if(Math.hypot(state.player.x-mon.x, state.player.y-mon.y) < INTERACT_DIST+20){
    renderText('[SPACE] 부딪히기', bx, by-56, 12, '#ef4444', 'center', true);
  }
}

const targetConfigs = {
  fishing:      { emoji:'🎣', color:'#38bdf8', label:'낚싯대 테스트' },
  kwPast:       { emoji:'📼', color:'#64748b', label:'이미 끝난 이슈' },
  kwTooEarly:   { emoji:'🗓️', color:'#22d3ee', label:'너무 이른 시즌 키워드' },
  kwHot:        { emoji:'🔥', color:'#f97316', label:'막 떠오르는 키워드' },
  dataroom:     { emoji:'💻', color:'#a855f7', label:'데이터 분석 단말기' },
  benchGood:    { emoji:'📊', color:'#4ade80', label:'상단 글 구조 벤치마킹' },
  benchBad:     { emoji:'📉', color:'#f97316', label:'엉뚱한 구조 따라 하기' },
  construction: { emoji:'🚧', color:'#f59e0b', label:'트래픽 설계 도면' },
  ctaBad:       { emoji:'🔗', color:'#64748b', label:'무성의한 클릭 유도' },
  ctaMid:       { emoji:'🪝', color:'#fbbf24', label:'애매한 클릭 유도' },
  ctaGood:      { emoji:'✨', color:'#22c55e', label:'매력적인 혜택 멘트' },
  engine:       { emoji:'⚙️', color:'#ef4444', label:'광고 가속 엔진' },
  cpa:          { emoji:'🎯', color:'#22c55e', label:'CPA / 제휴 연결' },
  brand:        { emoji:'🏛️', color:'#a855f7', label:'브랜드 구축' },
  stamp:        { emoji:'⭐', color:'#eab308', label:'최종 프리셀 / 로그아웃' }
};

function drawTargets(){
  for(const t of state.targets){
    if(!t.active) continue;
    const conf = targetConfigs[t.type];
    if(!conf) continue;

    const pulse = Math.sin(Date.now()/200 + t.x*0.01)*0.1 + 1;

    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.globalAlpha = 0.28;
    ctx.fillStyle = conf.color;
    ctx.beginPath(); ctx.arc(0,0,30*pulse,0,Math.PI*2); ctx.fill();

    ctx.globalAlpha = 1;
    ctx.font = '34px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(conf.emoji, 0, 0);
    renderText(conf.label, 0, -40, 11, conf.color, 'center', true);
    ctx.restore();

    if(Math.hypot(state.player.x-t.x, state.player.y-t.y) < INTERACT_DIST){
      renderText(`[SPACE] ${conf.label}`, t.x, t.y-56, 12, '#fff', 'center', true);
    }
  }
}

let flashAlpha = 0;
function drawFlash(){
  if(flashAlpha<=0) return;
  drawRect(0,0,W,H,'#ffffff',flashAlpha);
  flashAlpha = Math.max(0,flashAlpha-0.02);
}

function render(){
  ctx.clearRect(0,0,W,H);
  if(state.phase==='start') return;

  const sx=(Math.random()-.5)*state.camShake*8;
  const sy=(Math.random()-.5)*state.camShake*8;
  ctx.save();
  if(state.camShake>0){
    ctx.translate(sx,sy);
    state.camShake=Math.max(0,state.camShake-0.1);
  }

  drawBackground();
  drawTargets();
  drawMaster();
  drawMonster();
  drawPixelChar(state.player.x, state.player.y, state.player.dir, state.player.frame, true);
  drawFlash();
  ctx.restore();
}

let lastTime = 0;
function update(dt){
  if(state.phase!=='play') return;

  const pl = state.player;
  let moved = false;

  if(Input.keys['ArrowLeft']||Input.keys['KeyA']){ pl.x=Math.max(20, pl.x-SPEED*dt); pl.dir=1; moved=true; }
  else if(Input.keys['ArrowRight']||Input.keys['KeyD']){ pl.x=Math.min(W-20, pl.x+SPEED*dt); pl.dir=0; moved=true; }

  if(Input.keys['ArrowUp']||Input.keys['KeyW']){ pl.y=Math.max(100, pl.y-SPEED*dt); moved=true; }
  else if(Input.keys['ArrowDown']||Input.keys['KeyS']){ pl.y=Math.min(540, pl.y+SPEED*dt); moved=true; }

  if(moved){
    pl.frameTimer += dt;
    if(pl.frameTimer>0.1){
      pl.frame = (pl.frame+1)%4;
      pl.frameTimer = 0;
    }
  } else {
    pl.frame = 0;
    pl.frameTimer = 0;
  }

  if(Input.justPressed['Space']) handleInteraction();
  if(state.monster.shake>0) state.monster.shake = Math.max(0,state.monster.shake-3*dt);
  Input.justPressed = {};
}

function handleInteraction(){
  const pl = state.player;

  if(Math.hypot(pl.x-state.master.x, pl.y-state.master.y) < INTERACT_DIST){
    triggerMasterDialogue();
    return;
  }

  if(state.stage===2 && state.monster.alive &&
     Math.hypot(pl.x-state.monster.x, pl.y-state.monster.y) < INTERACT_DIST+20){
    attackMonster();
    return;
  }

  const target = getNearestTarget();
  if(target){
    executeTargetAction(target);
  }
}

function getNearestTarget(){
  let found = null;
  for(const t of state.targets){
    if(!t.active) continue;
    const dist = Math.hypot(state.player.x-t.x, state.player.y-t.y);
    if(dist < INTERACT_DIST){
      found = t;
      break;
    }
  }
  return found;
}

function triggerMasterDialogue(){
  const msgs = {
    1: "수익은 운이 아니다. 먼저 잠재 트래픽이 있는 키워드를 골라야 한다. 옛날 이슈와 너무 먼 미래 키워드는 버리고, 막 뜨는 주제를 잡게.",
    2: "대형 키워드의 덩치에 속지 마라. 데이터 없이 달려들면 가짜 노력만 남는다. 직접 부딪혀 그 무력함을 보게.",
    3: "좋은 키워드라도 내 글이 상단에 노출될 수 있는지 봐야 한다. 경쟁자의 구조를 뜯어보고, 노출된 결을 확장하게.",
    4: "이제 사람을 끌어들이는 이유를 설계할 차례다. 단순한 링크가 아니라, 왜 눌러야 하는지를 보여줘야 한다.",
    5: "수는 모였고 이유도 생겼다. 이제 광고와 제휴를 연결해 시간을 복사하게. 유료 레버리지는 손실이 아니라 학습의 가속이다.",
    6: "애드센스 하나에만 기대지 마라. CPA, 제휴, 자체 상품, 브랜딩으로 수익 구조를 두껍게 만들어야 오래 간다.",
    7: "잘 왔네. 잠재 트래픽, 노출 성공, 매력적인 유입 사유가 맞물릴 때 수익은 터진다. 마지막 도장을 찍고 로그아웃하게."
  };
  setDialog('박사님', msgs[state.stage]);
}

function executeTargetAction(t){
  switch(t.type){
    case 'fishing':
      state.traffic += 2;
      setDialog('시스템 알림', '낚싯대를 던져 시장 반응을 살핍니다. 먼저 수요를 체감합니다.');
      break;

    case 'kwPast':
      state.keywordPotential = Math.max(0, state.keywordPotential - 30);
      state.traffic = Math.max(0, state.traffic - 1);
      setDialog('시스템 알림', '이미 끝난 주제입니다. 노출돼도 들어오는 사람이 거의 없습니다.');
      t.active = false;
      break;

    case 'kwTooEarly':
      state.keywordPotential = Math.max(0, state.keywordPotential - 10);
      setDialog('시스템 알림', '너무 먼 미래 키워드입니다. 지금은 공허한 타이밍입니다.');
      t.active = false;
      break;

    case 'kwHot':
      state.keywordPotential = Math.min(100, state.keywordPotential + 50);
      state.traffic += 10;
      setDialog('시스템 알림', '지금 막 관심이 올라오는 주제입니다. 잠재 트래픽이 강하게 형성됩니다.');
      t.active = false;
      break;

    case 'dataroom':
      state.traffic += 5;
      setDialog('데이터 분석', 'O/X 데이터를 정리해 어떤 주제가 먹히는지 분석합니다.');
      break;

    case 'benchGood':
      state.exposureScore = Math.min(100, state.exposureScore + 30);
      setDialog('데이터 분석', '상단 글 구조를 분석하고 비슷한 장치를 적용했습니다. 노출 가능성이 크게 상승합니다.');
      t.active = false;
      break;

    case 'benchBad':
      state.exposureScore = Math.max(0, state.exposureScore - 10);
      setDialog('데이터 분석', '겉모습만 흉내 냈습니다. 본질을 파악하지 못해 의미 없는 수정만 늘어납니다.');
      t.active = false;
      break;

    case 'construction':
      state.traffic += 20;
      state.cpc += 0.1;
      setDialog('트래픽 설계', '외부 유입 입구를 설계합니다. 수가 늘고 구조가 정리됩니다.');
      break;

    case 'ctaBad':
      state.clickAppeal = Math.max(0, state.clickAppeal - 10);
      setDialog('유입 사유', '“아래 링크 클릭하세요”만으로는 약합니다. 사람은 움직일 이유가 필요합니다.');
      t.active = false;
      break;

    case 'ctaMid':
      state.clickAppeal = Math.min(100, state.clickAppeal + 5);
      setDialog('유입 사유', '“자세한 내용은 아래에서” 정도로는 경쟁이 심한 환경에서 눈에 띄기 어렵습니다.');
      t.active = false;
      break;

    case 'ctaGood':
      state.clickAppeal = Math.min(100, state.clickAppeal + 30);
      state.traffic += 10;
      setDialog('유입 사유', '혜택과 호기심을 동시에 건드리는 멘트입니다. 클릭할 이유가 생깁니다.');
      t.active = false;
      break;

    case 'engine':
      state.traffic += 40;
      state.cpc += 0.4;
      setDialog('광고 엔진 가동', '소액 광고비로 데이터를 빠르게 모읍니다. 시간 복사가 시작됩니다.');
      break;

    case 'cpa':
      state.cpc += 1.2;
      state.traffic += 15;
      setDialog('수익 파이프라인', 'CPA와 제휴를 연결해 광고 외 수익을 추가합니다.');
      t.active = false;
      break;

    case 'brand':
      state.cpc += 0.6;
      state.traffic += 20;
      state.clickAppeal = Math.min(100, state.clickAppeal + 10);
      setDialog('브랜딩', '브랜드가 생기면 플랫폼이 바뀌어도 사람이 따라옵니다. 장기 버프가 시작됩니다.');
      t.active = false;
      break;

    case 'stamp':
      setDialog('시스템 알림', '잠재 트래픽, 노출, 유입 사유의 3박자가 완성되었습니다. 로그아웃을 진행합니다...');
      updateRevenue();
      setTimeout(()=>{
        state.phase='end';
        showEndScreen();
      }, 1800);
      return;
  }

  stageProgressCheck();
  updateRevenue();
  updateMeta();
}

function attackMonster(){
  state.monster.shake = 1;
  state.camShake = 1.5;
  state.monster.hits += 1;

  if(state.monster.hits < 3){
    setDialog('대형 키워드 몬스터', `[데미지 0] 데이터 없는 노가다는 상단을 뚫지 못한다! (타격 횟수: ${state.monster.hits}/3)`);
  } else {
    setDialog('시스템 알림', '가짜 노력의 한계를 체감했습니다. 이제 데이터 기반 전략으로 전환합니다.');
    flashAlpha = 0.6;
    setTimeout(()=>{
      state.monster.alive = false;
      advanceStage(3, '노출 가능성 판단', 'dataroom');
      setStageTargets(3);
      setDialog('박사님', '이제 상단 구조를 벤치마킹하고, 노출되는 결로 확장하게.');
      updateMeta();
    }, 1200);
  }
}

function stageProgressCheck(){
  if(state.stage===1){
    const remainingKeywordCards = state.targets.filter(t=>['kwPast','kwTooEarly','kwHot'].includes(t.type) && t.active).length;
    if(state.keywordPotential >= 40 && remainingKeywordCards === 0){
      advanceStage(2, '가짜 노력의 함정', 'fishing');
      state.targets = [];
      state.monster = { x: 450, y: 340, alive: true, shake: 0, hits: 0 };
      setDialog('박사님', '좋은 키워드를 고르는 감은 생겼군. 하지만 덩치 큰 키워드 환상도 깨야 한다.');
      flashAlpha = 0.35;
    }
  }

  if(state.stage===3){
    if(state.keywordPotential >= 40 && state.exposureScore >= 60){
      advanceStage(4, '유입 사유 설계', 'construction');
      setStageTargets(4);
      setDialog('박사님', '노출되는 키워드와 안 되는 키워드를 구분했군. 이제 왜 눌러야 하는지를 설계하게.');
      flashAlpha = 0.35;
    }
  }

  if(state.stage===4){
    const ctaDone = state.targets.filter(t=>['ctaBad','ctaMid','ctaGood'].includes(t.type) && t.active).length === 0;
    if(state.clickAppeal >= 25 && ctaDone){
      advanceStage(5, '시간 복사 엔진', 'engine');
      setStageTargets(5);
      setDialog('박사님', '좋다. 이제 수와 단가를 빠르게 키우는 레버리지를 가동하게.');
      flashAlpha = 0.35;
    }
  }

  if(state.stage===5){
    if(state.traffic >= 80 && state.cpc >= 1.8){
      advanceStage(6, '수익 구조 확장', 'engine');
      setStageTargets(6);
      setDialog('박사님', '트래픽이 모였으니 CPA와 브랜딩으로 구조를 두껍게 만들 차례다.');
      flashAlpha = 0.35;
    }
  }

  if(state.stage===6){
    const done = state.targets.filter(t=>['cpa','brand'].includes(t.type) && t.active).length === 0;
    if(done){
      advanceStage(7, '프리셀 완성', 'meadow');
      setStageTargets(7);
      setDialog('박사님', '수익화 공식이 완성됐다. 마지막 도장으로 시스템을 마무리하게.');
      flashAlpha = 0.45;
    }
  }
}

function setStageTargets(stage){
  state.targets = [];
  if(stage===1){
    state.targets = [
      { x:120, y:350, type:'fishing', active:true },
      { x:210, y:270, type:'kwPast', active:true },
      { x:300, y:360, type:'kwTooEarly', active:true },
      { x:430, y:260, type:'kwHot', active:true }
    ];
  } else if(stage===3){
    state.targets = [
      { x:130, y:360, type:'dataroom', active:true },
      { x:290, y:260, type:'benchGood', active:true },
      { x:450, y:350, type:'benchGood', active:true },
      { x:210, y:450, type:'benchBad', active:true }
    ];
  } else if(stage===4){
    state.targets = [
      { x:120, y:360, type:'construction', active:true },
      { x:250, y:270, type:'ctaBad', active:true },
      { x:350, y:420, type:'ctaMid', active:true },
      { x:470, y:290, type:'ctaGood', active:true }
    ];
  } else if(stage===5){
    state.targets = [
      { x:170, y:340, type:'engine', active:true },
      { x:430, y:270, type:'engine', active:true }
    ];
  } else if(stage===6){
    state.targets = [
      { x:180, y:340, type:'cpa', active:true },
      { x:420, y:290, type:'brand', active:true }
    ];
  } else if(stage===7){
    state.targets = [
      { x:400, y:300, type:'stamp', active:true }
    ];
  }
}

function advanceStage(newStage, labelTxt, newBg){
  state.stage = newStage;
  state.bgDecor = newBg;
  document.getElementById('stage-label').textContent = `STAGE ${newStage}: ${labelTxt}`;
}

function setDialog(speaker, txt){
  const sp = document.getElementById('dialog-speaker');
  sp.textContent = speaker;
  sp.style.color =
    speaker==='박사님' ? '#00ff99' :
    (speaker.includes('몬스터') ? '#ef4444' :
    (speaker.includes('유입') ? '#fbbf24' :
    (speaker.includes('데이터') ? '#a855f7' : '#38bdf8')));
  document.getElementById('dialog-text').textContent = txt;
}

function updateRevenue(){
  const baseRev = state.traffic * state.cpc;
  const appealBonus = 1 + (state.clickAppeal / 200);
  const rev = baseRev * appealBonus;
  state.score = rev;
  document.getElementById('revenue').textContent =
    `REVENUE: $${rev.toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:2})}`;
}

function updateMeta(){
  document.getElementById('meta-label').textContent =
    `수: ${state.traffic} | 단가: $${state.cpc.toFixed(2)} | 잠재력: ${state.keywordPotential} | 노출: ${state.exposureScore} | 유입 사유: ${state.clickAppeal}`;
}

function showEndScreen(){
  const el = document.createElement('div');
  el.id='end-screen';
  el.style.cssText='position:absolute;inset:0;background:rgba(5,10,15,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;pointer-events:auto;z-index:100;';
  el.innerHTML = `
    <div style="font-size:56px;text-shadow:0 0 20px rgba(234,179,8,0.5);">⭐</div>
    <h1 style="font-size:32px;font-weight:700;color:#00ff99;text-align:center;">수익화 공식 완성</h1>
    <p style="color:#94a3b8;font-size:15px;text-align:center;line-height:1.8;max-width:470px;">
      최종 수익: <strong style="color:#00ff99;font-size:20px;">$${state.score.toLocaleString('en-US',{minimumFractionDigits:2, maximumFractionDigits:2})}</strong><br>
      잠재 트래픽이 있는 키워드를 고르고, 노출되는 결로 확장하며, 매력적인 유입 사유를 설계한 결과입니다.<br>
      이제부터는 운이 아니라, 당신이 설계한 본질 센스가 수익을 결정합니다.
    </p>
    <button onclick="location.reload()" style="background:#00ff99;color:#050a0f;border:none;border-radius:6px;padding:12px 32px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Satoshi',sans-serif;margin-top:10px;">
      다시 증명하기
    </button>
  `;
  document.getElementById('wrap').appendChild(el);
}

let _fpsF=0,_fpsL=performance.now(),_fpsVal=0;
function updateFPS(now){
  _fpsF++;
  if(now-_fpsL>=1000){
    _fpsVal=Math.round(_fpsF*1000/(now-_fpsL));
    _fpsF=0; _fpsL=now;
    document.getElementById('fps').textContent=`FPS:${_fpsVal}`;
  }
}

function loop(now){
  const dt = Math.min((now-lastTime)/1000, 0.05);
  lastTime = now;
  update(dt);
  render();
  updateFPS(now);
  requestAnimationFrame(loop);
}

document.getElementById('start-btn').addEventListener('click', ()=>{
  document.getElementById('start-screen').remove();
  state.phase = 'play';
  setStageTargets(1);
  updateRevenue();
  updateMeta();
  setDialog('박사님', '수익은 수와 가격의 곱이지만, 시작은 잠재 트래픽이다. 먼저 사람들이 앞으로 찾아올 주제를 고르게.');
  lastTime = performance.now();
  requestAnimationFrame(loop);
});
</script>
</body>
</html>
