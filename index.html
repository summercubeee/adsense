<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>본질센스 RPG: 가짜 노력의 종말</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 4px solid #444; image-rendering: pixelated; box-shadow: 0 0 40px rgba(0,0,0,1); }
    </style>
</head>
<body>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 600,
            height: 600,
            pixelArt: true,
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, master, monster, itemSprite, bg, cursors;
        let score = 0, stage = 1;
        let scoreText, stageLabel, dialogBox, dialogText;

        function preload() {
            // 점주님이 올리신 실제 파일명(.png.jpg)에 맞게 코드를 수정했습니다.
            this.load.image('player', 'player.png.jpg');
            this.load.image('master', 'master.png.jpg');
            this.load.image('monster', 'enemy_slime.png.jpg');
            
            this.load.image('bg_fishing', 'bg_fishing.png.jpg');
            this.load.image('bg_dataroom', 'bg_dataroom.png.jpg');
            this.load.image('bg_construction', 'bg_construction.png.jpg');
            this.load.image('bg_engine', 'bg_engine.png.jpg');
            this.load.image('bg_meadow', 'bg_meadow.png.jpg');
            
            this.load.image('item_goggles', 'item_goggles.png.jpg');
            this.load.image('item_stamp', 'item_stamp.png.jpg');
        }

        function create() {
            bg = this.add.image(300, 300, 'bg_fishing').setDisplaySize(600, 600).setAlpha(0.6);

            master = this.physics.add.sprite(300, 150, 'master').setDisplaySize(60, 80);
            this.add.text(300, 80, 'MASTER', { font: 'bold 16px Courier', fill: '#ffcc00' }).setOrigin(0.5);

            player = this.physics.add.sprite(300, 450, 'player').setDisplaySize(50, 50);
            player.setCollideWorldBounds(true);

            monster = this.physics.add.sprite(1000, 1000, 'monster').setDisplaySize(80, 80);

            itemSprite = this.add.image(300, 300, 'item_goggles').setVisible(false);

            scoreText = this.add.text(20, 20, 'REVENUE: $0.00', { font: 'bold 24px Courier', fill: '#00ff88' });
            stageLabel = this.add.text(20, 55, 'STAGE 1: 정석 수련', { font: '14px Courier', fill: '#aaa' });
            dialogBox = this.add.rectangle(300, 530, 560, 100, 0x000000).setAlpha(0.85).setStrokeStyle(2, 0x00ff88);
            dialogText = this.add.text(300, 530, "박사님: '수련을 시작하게. 가까이 와서 [Space]를 누르게.'", { 
                font: '14px Courier', fill: '#fff', align: 'center', wordWrap: { width: 500 } 
            }).setOrigin(0.5);

            cursors = this.input.keyboard.createCursorKeys();
        }

        function update() {
            player.setVelocity(0);
            
            if (cursors.left.isDown) player.setVelocityX(-160);
            else if (cursors.right.isDown) player.setVelocityX(160);
            if (cursors.up.isDown) player.setVelocityY(-160);
            else if (cursors.down.isDown) player.setVelocityY(160);

            if (Phaser.Input.Keyboard.JustDown(cursors.space)) {
                checkInteraction();
            }
        }

        function checkInteraction() {
            const distMaster = Phaser.Math.Distance.Between(player.x, player.y, master.x, master.y);
            const distMonster = Phaser.Math.Distance.Between(player.x, player.y, monster.x, monster.y);

            if (distMaster < 100) runStageDialogue();
            else if (stage === 2 && distMonster < 120) {
                updateDialog("가짜노력 몬스터: '데이터 없는 네 노가다는 내 HP를 깎을 수 없다!'");
                game.scene.scenes[0].cameras.main.shake(200, 0.01);
                game.scene.scenes[0].time.delayedCall(2500, () => {
                    stage = 3;
                    stageLabel.setText("STAGE 3: 마켓 데이터 룸");
                    bg.setTexture('bg_dataroom');
                    monster.setPosition(1000, 1000);
                    itemSprite.setTexture('item_goggles').setPosition(player.x, player.y - 50).setVisible(true);
                    game.scene.scenes[0].tweens.add({ targets: itemSprite, y: player.y - 80, alpha: 0, duration: 2000 });
                    updateDialog("박사님: '보았는가? 데이터 안경을 끼고 진짜 O, X를 구분하게.'");
                });
            }
        }

        function runStageDialogue() {
            switch(stage) {
                case 1:
                    updateDialog("박사님: '글은 인격이다. 검색자가 원하는 정보를 정확히 적어라.'");
                    score += 0.01;
                    if (score >= 0.05) { stage = 2; monster.setPosition(150, 300); stageLabel.setText("STAGE 2: 가짜 노력의 습격"); }
                    break;
                case 3:
                    updateDialog("박사님: '데이터가 O라고 하는 곳에 네 모든 힘을 쏟아부어라.'");
                    score += 10;
                    if (score >= 50) { stage = 4; bg.setTexture('bg_construction'); stageLabel.setText("STAGE 4: 마트 설계 (마케터 전직)"); }
                    break;
                case 4:
                    updateDialog("박사님: '어디서 팔지(트래픽처) 먼저 정하고, 종량제 입구를 설계하라!'");
                    score += 100;
                    if (score >= 500) { stage = 5; stageLabel.setText("STAGE 5: 시간 복사"); }
                    break;
                case 5:
                    updateDialog("박사님: '유료 광고는 시간 복사 기술이다. 80원으로 데이터를 사라.'");
                    score += 1000;
                    if (score >= 3000) { stage = 6; bg.setTexture('bg_engine'); stageLabel.setText("STAGE 6: 시스템 무한동력"); }
                    break;
                case 6:
                    updateDialog("박사님: '자동화 시스템이 작동한다. 쉬운 유입을 고단가 CPA로 연결하라!'");
                    score += 5000;
                    if (score >= 10000) { 
                        stage = 7; bg.setTexture('bg_meadow'); stageLabel.setText("STAGE 7: 공간적 자유"); 
                        itemSprite.setTexture('item_stamp').setPosition(player.x, player.y - 50).setVisible(true).setAlpha(1);
                        game.scene.scenes[0].tweens.add({ targets: itemSprite, y: player.y - 80, alpha: 0, duration: 2000 });
                    }
                    break;
                case 7:
                    updateDialog("박사님: '이 O/X 도장(Pre-sell)으로 먼저 팔아보고 확장하라. 이제 노트북을 덮게.'");
                    this.cameras.main.fade(3000, 0, 0, 0);
                    break;
            }
            scoreText.setText('REVENUE: $' + score.toFixed(2));
        }

        function updateDialog(txt) { dialogText.setText(txt); }
    </script>
</body>
</html>
